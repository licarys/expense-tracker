// ---------------------------------------------------------------------------
// Minimal test runner
// ---------------------------------------------------------------------------
const suites = [];
let _current = null;

function describe(name, fn) {
  _current = { name, tests: [] };
  suites.push(_current);
  fn();
  _current = null;
}

function it(label, fn) {
  try {
    fn();
    _current.tests.push({ label, ok: true });
  } catch (e) {
    _current.tests.push({ label, ok: false, error: e.message || String(e) });
  }
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected)
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toEqual(expected) {
      const a = JSON.stringify(actual), b = JSON.stringify(expected);
      if (a !== b) throw new Error(`Expected ${b}, got ${a}`);
    },
    toBeNull() {
      if (actual !== null)
        throw new Error(`Expected null, got ${JSON.stringify(actual)}`);
    },
    toBeTruthy() {
      if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
    },
    toBeFalsy() {
      if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
    },
    toBeCloseTo(expected, decimals = 2) {
      const factor = Math.pow(10, decimals);
      if (Math.round(actual * factor) !== Math.round(expected * factor))
        throw new Error(`Expected ~${expected}, got ${actual}`);
    },
    toContain(str) {
      if (!String(actual).includes(str))
        throw new Error(`Expected "${actual}" to contain "${str}"`);
    },
    toBeUndefined() {
      if (actual !== undefined)
        throw new Error(`Expected undefined, got ${JSON.stringify(actual)}`);
    },
  };
}

  it('detects € as EUR', () => {

    expect(d.getFullYear()).toBe(2024);
    expect(d.getMonth()).toBe(5);   // June = index 5
    expect(d.getDate()).toBe(15);
  });
  it('parses ISO datetime string', () => {
    const d = parseExpenseDate('2024-01-20T10:30:00Z');
    expect(d.getFullYear()).toBe(2024);
    expect(d.getMonth()).toBe(0);
  });
  it('returns null for empty string', () => {
    expect(parseExpenseDate('')).toBeNull();
  });
  it('returns null for null', () => {
    expect(parseExpenseDate(null)).toBeNull();
  });
  it('returns null for a small number (not a serial)', () => {
    expect(parseExpenseDate(999)).toBeNull();
  });
  it('parses Excel serial number (e.g. 45399 = 2024-03-29)', () => {
    const d = parseExpenseDate(45399);
    expect(d).toBeTruthy();
    expect(d.getFullYear()).toBe(2024);
  });
  it('returns null for invalid date string', () => {
    expect(parseExpenseDate('not-a-date')).toBeNull();
  });
  it('handles a Date object directly', () => {
    const src = new Date(2023, 11, 25, 12, 0, 0);
    const d = parseExpenseDate(src);
    expect(d.getFullYear()).toBe(2023);
    expect(d.getMonth()).toBe(11);
    expect(d.getDate()).toBe(25);
  });
});

describe('findSharedExpenseFile', () => {
  const items = [
    {
      name: 'expenses-pareja.xlsx',
      id: 'local-123',
      remoteItem: { id: 'remote-456', parentReference: { driveId: 'drive-789' } }
    },
    {
      name: 'other-file.docx',
      id: 'local-abc',
      remoteItem: { id: 'remote-def', parentReference: { driveId: 'drive-ghi' } }
    },
  ];

  it('finds the matching file by name', () => {
    const result = findSharedExpenseFile(items, 'expenses-pareja.xlsx');
    expect(result).toBeTruthy();
  });

  it('uses remoteItem.id as itemId', () => {
    const result = findSharedExpenseFile(items, 'expenses-pareja.xlsx');
    expect(result.itemId).toBe('remote-456');
  });

  it('uses remoteItem.parentReference.driveId as driveId', () => {
    const result = findSharedExpenseFile(items, 'expenses-pareja.xlsx');
    expect(result.driveId).toBe('drive-789');
  });

  it('returns null when filename not found', () => {
    expect(findSharedExpenseFile(items, 'not-found.xlsx')).toBeNull();
  });

  it('returns null for empty items array', () => {
    expect(findSharedExpenseFile([], 'expenses-pareja.xlsx')).toBeNull();
  });

  it('falls back to top-level ids when remoteItem is absent', () => {
    const localItems = [{ name: 'expenses.xlsx', id: 'top-id', parentReference: { driveId: 'top-drive' } }];
    const result = findSharedExpenseFile(localItems, 'expenses.xlsx');
    expect(result.itemId).toBe('top-id');
    expect(result.driveId).toBe('top-drive');
  });

  it('does not mutate the input array', () => {
    findSharedExpenseFile(items, 'expenses-pareja.xlsx');
    expect(items.length).toBe(2);
  });
});

describe('isTokenExpired', () => {
  it('returns false when expiryMs is 0', () => {
    expect(isTokenExpired(0, 1_000_000)).toBeFalsy();
  });
  it('returns false when expiryMs is null', () => {
    expect(isTokenExpired(null, 1_000_000)).toBeFalsy();
  });
  it('returns false when expiryMs is undefined', () => {
    expect(isTokenExpired(undefined, 1_000_000)).toBeFalsy();
  });
  it('returns true when now > expiryMs (token expired)', () => {
    expect(isTokenExpired(1000, 2000)).toBeTruthy();
  });
  it('returns false when now < expiryMs (token still valid)', () => {
    expect(isTokenExpired(2000, 1000)).toBeFalsy();
  });
  it('returns true when now === expiryMs (boundary — treat as expired)', () => {
    expect(isTokenExpired(1000, 1000)).toBeTruthy();
  });
  it('falls back to real Date.now() — very old expiry is expired', () => {
    expect(isTokenExpired(1000)).toBeTruthy();
  });
  it('falls back to real Date.now() — far-future expiry is valid', () => {
    expect(isTokenExpired(9_999_999_999_999)).toBeFalsy();
  });
});

describe('filterCategories', () => {
  const cats = [
    { key: 'food',          name: 'Food',          emoji: '🥗' },
    { key: 'transport',     name: 'Transport',     emoji: '🚗' },
    { key: 'entertainment', name: 'Entertainment', emoji: '🎬' },
    { key: 'health',        name: 'Health',        emoji: '❤️'  },
    { key: 'shopping',      name: 'Shopping',      emoji: '🛍️' },
    { key: 'other',         name: 'Other',         emoji: '📦' },
  ];

  it('returns all categories when query is empty string', () => {
    expect(filterCategories(cats, '').length).toBe(6);
  });

  it('returns all categories when query is null', () => {
    expect(filterCategories(cats, null).length).toBe(6);
  });

  it('returns all categories when query is whitespace only', () => {
    expect(filterCategories(cats, '   ').length).toBe(6);
  });

  it('filters by exact name (case-insensitive)', () => {
    const result = filterCategories(cats, 'food');
    expect(result.length).toBe(1);
    expect(result[0].key).toBe('food');
  });

  it('is case-insensitive', () => {
    const result = filterCategories(cats, 'FOOD');
    expect(result.length).toBe(1);
    expect(result[0].key).toBe('food');
  });

  it('matches partial name', () => {
    const result = filterCategories(cats, 'ent');
    expect(result.length).toBe(1);
    expect(result[0].key).toBe('entertainment');
  });

  it('returns multiple matches when query matches several names', () => {
    // 'h' matches Health and Shopping
    const result = filterCategories(cats, 'h');
    expect(result.some(c => c.key === 'health')).toBeTruthy();
    expect(result.some(c => c.key === 'shopping')).toBeTruthy();
  });

  it('returns empty array when no name matches', () => {
    expect(filterCategories(cats, 'zzzz').length).toBe(0);
  });

  it('does not mutate the input array', () => {
    filterCategories(cats, 'food');
    expect(cats.length).toBe(6);
  });

  it('handles an empty categories array gracefully', () => {
    expect(filterCategories([], 'food').length).toBe(0);
  });
});

describe('buildMonthlySummary', () => {
  // June 2026 = month index 5
  const junExpenses = [
    { date: '2026-06-01', amount: 30,  currency: 'USD', category: 'food'      },
    { date: '2026-06-05', amount: 20,  currency: 'USD', category: 'transport' },
    { date: '2026-06-10', amount: 15,  currency: 'USD', category: 'food'      },
    { date: '2026-05-20', amount: 99,  currency: 'USD', category: 'food'      }, // May — must be excluded
  ];

  const cats = [
    { key: 'food',      name: 'Food',      emoji: '🥗', budget: 300 },
    { key: 'transport', name: 'Transport', emoji: '🚗', budget: 150 },
    { key: 'other',     name: 'Other',     emoji: '📦', budget: 100 },
  ];

  it('monthLabel uses MONTH_NAMES short name', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    expect(s.monthLabel).toBe('Jun 2026');
  });

  it('only sums expenses from the target month', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    expect(s.total).toBeCloseTo(65, 2); // 30 + 20 + 15 (May 99 excluded)
  });

  it('returns 0 total for a month with no data', () => {
    const s = buildMonthlySummary(junExpenses, cats, 0, 2026);
    expect(s.total).toBe(0);
  });

  it('counts only expenses from the target month', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    expect(s.expenseCount).toBe(3);
  });

  it('expenseCount is 0 when month has no data', () => {
    const s = buildMonthlySummary(junExpenses, cats, 0, 2026);
    expect(s.expenseCount).toBe(0);
  });

  it('computes per-category spent correctly', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    const food = s.categories.find(c => c.key === 'food');
    expect(food.spent).toBeCloseTo(45, 2); // 30 + 15
  });

  it('categories with no expenses have spent = 0', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    const other = s.categories.find(c => c.key === 'other');
    expect(other.spent).toBe(0);
  });

  it('totalBudget is the sum of all category budgets', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    expect(s.totalBudget).toBe(550); // 300 + 150 + 100
  });

  it('remaining equals totalBudget minus total', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    expect(s.remaining).toBeCloseTo(s.totalBudget - s.total, 2);
  });

  it('remaining is negative when total spending exceeds total budget', () => {
    // totalBudget for cats = 300+150+100 = 550; spend 600 to go over
    const bigExpenses = [
      { date: '2026-06-01', amount: 600, currency: 'USD', category: 'food' },
    ];
    const s = buildMonthlySummary(bigExpenses, cats, 5, 2026);
    expect(s.remaining < 0).toBeTruthy();
  });

  it('output categories array has same length as input categories', () => {
    const s = buildMonthlySummary(junExpenses, cats, 5, 2026);
    expect(s.categories.length).toBe(cats.length);
  });
});

describe('parsePaidBy', () => {
  const aliases = [
    { key: 'yo',      names: ['yo', 'lili'] },
    { key: 'partner', names: ['él', 'gaby'] },
  ];

  it('returns null when text has no payer keyword', () => {
    expect(parsePaidBy('Lunch $12 food', aliases)).toBeNull();
  });
  it('detects "yo" as self (at start of string)', () => {
    expect(parsePaidBy('yo pagué el lunch $12', aliases)).toBe('yo');
  });
  it('detects "yo" mid-sentence', () => {
    expect(parsePaidBy('pague yo el taxi $8', aliases)).toBe('yo');
  });
  it('detects partner by name', () => {
    expect(parsePaidBy('gaby pagó el taxi $8', aliases)).toBe('partner');
  });
  it('detects partner by pronoun "él"', () => {
    expect(parsePaidBy('él pagó el café $3', aliases)).toBe('partner');
  });
  it('is case-insensitive', () => {
    expect(parsePaidBy('LILI pagó $20', aliases)).toBe('yo');
  });
  it('returns null for empty string', () => {
    expect(parsePaidBy('', aliases)).toBeNull();
  });
  it('returns null for null text', () => {
    expect(parsePaidBy(null, aliases)).toBeNull();
  });
  it('returns null for empty aliases list', () => {
    expect(parsePaidBy('yo pagué $10', [])).toBeNull();
  });
  it('returns null when aliases is null', () => {
    expect(parsePaidBy('yo pagué $10', null)).toBeNull();
  });
  it('does not match "yo" inside a longer word like "yogurt"', () => {
    expect(parsePaidBy('yogurt $5', aliases)).toBeNull();
  });
  it('returns the first matching payer key when multiple could match', () => {
    const aliasesOverlap = [
      { key: 'yo', names: ['yo', 'lili'] },
      { key: 'partner', names: ['yo', 'gaby'] }, // 'yo' also in partner
    ];
    expect(parsePaidBy('yo pagué $10', aliasesOverlap)).toBe('yo');
  });
});

describe('buildPayerSummary', () => {
  localStorage.setItem('et_exchange_rates', JSON.stringify({ NIO: 36.5 }));

  const junExpenses = [
    { date: '2026-06-01', amount: 30,  currency: 'USD', paidBy: 'Lili' },
    { date: '2026-06-05', amount: 20,  currency: 'USD', paidBy: 'Gaby' },
    { date: '2026-06-10', amount: 15,  currency: 'USD', paidBy: 'Lili' },
    { date: '2026-05-20', amount: 99,  currency: 'USD', paidBy: 'Lili' }, // May — excluded
    { date: '2026-06-15', amount: 10,  currency: 'USD', paidBy: null   }, // no payer — excluded
    { date: '2026-06-20', amount: 365, currency: 'NIO', paidBy: 'Gaby' }, // foreign currency
  ];

  it('returns totals per payer for the target month', () => {
    const r = buildPayerSummary(junExpenses, 5, 2026);
    expect(r['Lili']).toBeCloseTo(45, 2); // 30 + 15
  });
  it('sums multiple expenses for the same payer', () => {
    const r = buildPayerSummary(junExpenses, 5, 2026);
    // Gaby: $20 + 365 NIO ≈ $20 + $10 = $30
    expect(r['Gaby']).toBeCloseTo(30, 2);
  });
  it('excludes expenses from other months', () => {
    const r = buildPayerSummary(junExpenses, 5, 2026);
    // If May were included, Lili total would be 144
    expect(r['Lili']).toBeCloseTo(45, 2);
  });
  it('excludes expenses with null paidBy', () => {
    const r = buildPayerSummary(junExpenses, 5, 2026);
    expect(r[null]).toBeUndefined();
    expect(r['undefined']).toBeUndefined();
  });
  it('returns empty object for month with no data', () => {
    const r = buildPayerSummary(junExpenses, 0, 2026);
    expect(Object.keys(r).length).toBe(0);
  });
  it('returns empty object for empty expenses list', () => {
    const r = buildPayerSummary([], 5, 2026);
    expect(Object.keys(r).length).toBe(0);
  });
  it('does not mutate the input array', () => {
    buildPayerSummary(junExpenses, 5, 2026);
    expect(junExpenses.length).toBe(6);
  });
});

// ---------------------------------------------------------------------------
// Render results
// ---------------------------------------------------------------------------
(function renderResults() {
  const container = document.getElementById('results');
  let totalPass = 0, totalFail = 0;

  suites.forEach(suite => {
    const div = document.createElement('div');
    div.className = 'suite';

    const title = document.createElement('div');
    title.className = 'suite-title';
    title.textContent = suite.name;
    div.appendChild(title);

    suite.tests.forEach(t => {
      if (t.ok) totalPass++; else totalFail++;

      const row = document.createElement('div');
      row.className = 'test';

      const badge = document.createElement('div');
      badge.className = 'badge ' + (t.ok ? 'pass' : 'fail');
      badge.textContent = t.ok ? '✓' : '✗';

      const labelWrap = document.createElement('div');
      labelWrap.className = 'label';
      labelWrap.textContent = t.label;

      if (!t.ok && t.error) {
        const err = document.createElement('div');
        err.className = 'error';
        err.textContent = t.error;
        labelWrap.appendChild(err);
      }

      row.appendChild(badge);
      row.appendChild(labelWrap);
      div.appendChild(row);
    });

    container.appendChild(div);
  });

  const total = totalPass + totalFail;
  document.getElementById('summary').innerHTML =
    `<div class="stat green"><span>${totalPass}</span> passed</div>` +
    (totalFail > 0 ? `<div class="stat red"><span>${totalFail}</span> failed</div>` : '') +
    `<div class="stat" style="color:#64748b"><span>${total}</span> total</div>`;

  document.title = `Tests (${totalPass}/${total}) — Expense Tracker`;
})();
</script>
